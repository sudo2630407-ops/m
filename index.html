<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 학교생활 MBTI 테스트</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"맑은 고딕",sans-serif;
}

body{
background:#eef3ff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:white;
width:100%;
max-width:600px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#4f46e5;
margin-bottom:10px;
}

.info{
text-align:center;
color:#777;
margin-bottom:20px;
}

.progress{
height:10px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.bar{
height:100%;
width:0;
background:#6366f1;
transition:.3s;
}

.question{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
line-height:1.5;
}

button{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:12px;
background:#eef2ff;
font-size:16px;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#6366f1;
color:white;
}

#result{
display:none;
text-align:center;
}

#result h2{
font-size:40px;
color:#4f46e5;
margin:20px 0;
}

#desc{
font-size:18px;
line-height:1.7;
margin:20px 0;
}

.restart{
background:#4f46e5;
color:white;
}
</style>

</head>
<body>

<div class="container">

<div id="quiz">

<h1>📚 학교생활 MBTI 테스트</h1>
<div class="info">학교에서의 나를 알아보자! 😊</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="number"></div>

<div class="question" id="question"></div>

<div id="answers"></div>

</div>

<div id="result">

<h1>🎉 결과</h1>

<h2 id="mbti"></h2>

<p id="desc"></p>

<button class="restart" onclick="location.reload()">
🔄 다시하기
</button>

</div>

</div>

<script>

const questions=[

{
q:"🎒 새 학기 첫날!",
a1:"먼저 친구에게 말을 건다 😄",
a2:"친구가 먼저 와주길 기다린다 🙂",
t1:"E",t2:"I"
},

{
q:"📚 시험이 일주일 남았다.",
a1:"공부 계획표부터 만든다 📅",
a2:"며칠 전부터 시작한다 😅",
t1:"J",t2:"P"
},

{
q:"🔬 과학 실험 시간!",
a1:"새로운 방법도 해보고 싶다 💡",
a2:"설명서를 그대로 따른다 📄",
t1:"N",t2:"S"
},

{
q:"😢 친구가 시험을 망쳤다.",
a1:"먼저 위로해준다 🤗",
a2:"다음 시험 공부법을 알려준다 📖",
t1:"F",t2:"T"
},

{
q:"🍛 급식시간!",
a1:"여러 친구들과 같이 먹는다 🍴",
a2:"친한 친구와 조용히 먹는다 😊",
t1:"E",t2:"I"
},

{
q:"🎭 학교 축제 준비!",
a1:"새로운 아이디어를 낸다 🚀",
a2:"작년처럼 하는 게 좋다 👍",
t1:"N",t2:"S"
},

{
q:"📝 수행평가 제출!",
a1:"며칠 전에 끝냈다 😎",
a2:"마감 직전에 완성했다 😂",
t1:"J",t2:"P"
},

{
q:"👥 조별 과제에서 친구가 일을 안 했다.",
a1:"이유부터 들어본다 🙂",
a2:"역할을 지켜야 한다고 말한다 💬",
t1:"F",t2:"T"
}

];

const desc={

INTJ:"🧠 계획적이고 책임감이 강한 전략가입니다.",
INTP:"💡 호기심이 많고 아이디어가 풍부한 탐구형입니다.",
ENTJ:"🚀 리더십이 뛰어나고 추진력이 강합니다.",
ENTP:"🎯 새로운 도전을 즐기는 아이디어 뱅크입니다.",
INFJ:"🌱 배려심이 깊고 친구들의 고민을 잘 들어줍니다.",
INFP:"🌸 감수성이 풍부하고 창의력이 뛰어납니다.",
ENFJ:"😊 모두를 챙기는 따뜻한 리더입니다.",
ENFP:"🎉 활발하고 긍정적인 분위기 메이커입니다.",
ISTJ:"📚 성실하고 책임감이 강한 모범생 스타일입니다.",
ISFJ:"💖 조용하지만 친구들을 잘 도와줍니다.",
ESTJ:"📋 체계적이고 계획적으로 행동합니다.",
ESFJ:"🥰 사람들과 함께하는 것을 좋아합니다.",
ISTP:"🔧 직접 해보며 배우는 실전형입니다.",
ISFP:"🎨 따뜻한 감성과 예술적인 감각을 가지고 있습니다.",
ESTP:"⚡ 활동적이고 새로운 경험을 즐깁니다.",
ESFP:"🎈 밝고 유쾌한 학교의 분위기 메이커입니다."

};

let score={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};

let current=0;

const q=document.getElementById("question");
const a=document.getElementById("answers");
const bar=document.getElementById("bar");
const num=document.getElementById("number");

function show(){

num.innerHTML="<b>"+(current+1)+"</b> / "+questions.length;

bar.style.width=(current/questions.length*100)+"%";

let x=questions[current];

q.innerHTML=x.q;

a.innerHTML=`
<button onclick="choose('${x.t1}')">${x.a1}</button>
<button onclick="choose('${x.t2}')">${x.a2}</button>
`;

}

function choose(type){

score[type]++;

current++;

if(current<questions.length){

show();

}else{

finish();

}

}

function finish(){

document.getElementById("quiz").style.display="none";

document.getElementById("result").style.display="block";

let mbti=
(score.E>=score.I?"E":"I")+
(score.S>=score.N?"S":"N")+
(score.T>=score.F?"T":"F")+
(score.J>=score.P?"J":"P");

document.getElementById("mbti").innerHTML=mbti;

document.getElementById("desc").innerHTML=desc[mbti];

}

show();

</script>

</body>
</html>
