<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 학교생활 MBTI 테스트</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f5f7fb;
display:flex;
justify-content:center;
padding:30px;
}

.container{
background:white;
width:100%;
max-width:700px;
border-radius:20px;
padding:35px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:10px;
color:#4f46e5;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

.progress{
height:10px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-bottom:25px;
}

.bar{
height:100%;
width:0%;
background:#6366f1;
transition:.3s;
}

.question{
font-size:22px;
font-weight:bold;
margin-bottom:25px;
line-height:1.5;
}

button{
width:100%;
padding:15px;
font-size:17px;
margin:10px 0;
border:none;
border-radius:12px;
cursor:pointer;
transition:.25s;
}

.answer{
background:#eef2ff;
}

.answer:hover{
background:#6366f1;
color:white;
transform:translateY(-2px);
}

.result{
display:none;
text-align:center;
}

.result h2{
color:#4f46e5;
font-size:38px;
margin:20px 0;
}

.result p{
line-height:1.8;
margin:15px 0;
color:#444;
}

.restart{
background:#4f46e5;
color:white;
}

.restart:hover{
background:#3730a3;
}
</style>
</head>
<body>

<div class="container">

<div id="quiz">

<h1>📚 학교생활 MBTI 테스트</h1>
<div class="subtitle">
학교에서의 행동으로 알아보는 나의 MBTI 😊
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="count"></div>

<div class="question" id="question"></div>

<div id="answers"></div>

</div>

<div class="result" id="result">
<h1>🎉 테스트 완료!</h1>

<h2 id="mbti"></h2>

<p id="desc"></p>

<button class="restart" onclick="location.reload()">
🔄 다시 하기
</button>

</div>

</div>

<script>

const questions=[

{
q:"🏫 아침에 학교에 오면?",
a1:"친구들과 먼저 이야기한다",
a2:"조용히 자리에 앉는다",
type1:"E",
type2:"I"
},

{
q:"🙋 발표 시간이 되었다!",
a1:"손부터 든다",
a2:"다른 친구를 기다린다",
type1:"E",
type2:"I"
},

{
q:"🍱 점심시간에는?",
a1:"여러 친구들과 먹는다",
a2:"친한 친구 몇 명과 먹는다",
type1:"E",
type2:"I"
},

{
q:"📝 숙제를 할 때",
a1:"계획보다 느낌대로 한다",
a2:"순서를 정해둔다",
type1:"P",
type2:"J"
},

{
q:"📅 시험기간에는",
a1:"벼락치기도 괜찮다",
a2:"미리미리 준비한다",
type1:"P",
type2:"J"
},

{
q:"🎒 준비물을 챙길 때",
a1:"빠뜨리는 경우가 있다",
a2:"전날 미리 확인한다",
type1:"P",
type2:"J"
},

{
q:"🔬 과학 실험 시간!",
a1:"새로운 방법을 시도한다",
a2:"설명서를 그대로 따른다",
type1:"N",
type2:"S"
},

{
q:"📖 문제를 풀 때",
a1:"아이디어부터 떠올린다",
a2:"사실을 먼저 확인한다",
type1:"N",
type2:"S"
},

{
q:"🎨 수행평가에서",
a1:"창의적인 아이디어를 낸다",
a2:"예시를 참고한다",
type1:"N",
type2:"S"
},

{
q:"🤝 친구가 고민 상담을 한다",
a1:"공감부터 해준다",
a2:"해결 방법을 알려준다",
type1:"F",
type2:"T"
},

{
q:"⚽ 조별활동 중 갈등이 생기면",
a1:"분위기를 먼저 생각한다",
a2:"효율적으로 해결한다",
type1:"F",
type2:"T"
},

{
q:"📢 친구가 실수했다면",
a1:"기분이 상하지 않게 말한다",
a2:"바로 문제를 알려준다",
type1:"F",
type2:"T"
}

];

const descriptions={

"INTJ":"🧠 전략가형! 계획을 세우는 것을 좋아하며 목표를 향해 꾸준히 나아갑니다.",

"INTP":"💡 아이디어가 넘치는 탐구형! 궁금한 것이 생기면 끝까지 파고듭니다.",

"ENTJ":"🚀 리더형! 친구들을 이끌며 목표를 이루는 것을 좋아합니다.",

"ENTP":"🎯 도전형! 새로운 아이디어와 토론을 즐깁니다.",

"INFJ":"🌱 배려심이 깊고 친구들의 고민을 잘 들어줍니다.",

"INFP":"🌸 감성이 풍부하고 창의적인 학생입니다.",

"ENFJ":"😊 모두를 챙기는 따뜻한 리더입니다.",

"ENFP":"🎉 밝고 활발하며 새로운 친구를 쉽게 사귑니다.",

"ISTJ":"📚 성실하고 책임감이 강한 모범생 스타일!",

"ISFJ":"💖 조용하지만 친구들을 잘 도와주는 학생입니다.",

"ESTJ":"📋 체계적이고 규칙을 잘 지킵니다.",

"ESFJ":"🥰 친구들과 협력하는 것을 좋아합니다.",

"ISTP":"🔧 직접 해보며 배우는 실전형!",

"ISFP":"🎨 예술 감각이 뛰어나고 배려심이 있습니다.",

"ESTP":"⚡ 활동적이고 모험을 좋아합니다.",

"ESFP":"🎈 분위기 메이커! 모두와 잘 어울립니다."

};

let index=0;

let score={
E:0,I:0,
S:0,N:0,
T:0,F:0,
J:0,P:0
};

const question=document.getElementById("question");
const answers=document.getElementById("answers");
const bar=document.getElementById("bar");
const count=document.getElementById("count");

function showQuestion(){

count.innerHTML=`<b>${index+1}</b> / ${questions.length}`;

bar.style.width=((index)/questions.length*100)+"%";

const q=questions[index];

question.innerHTML=q.q;

answers.innerHTML=`
<button class="answer" onclick="choose('${q.type1}')">${q.a1}</button>
<button class="answer" onclick="choose('${q.type2}')">${q.a2}</button>
`;

}

function choose(type){

score[type]++;

index++;

if(index<questions.length){

showQuestion();

}else{

showResult();

}

}

function showResult(){

bar.style.width="100%";

document.getElementById("quiz").style.display="none";

document.getElementById("result").style.display="block";

const mbti=
(score.E>=score.I?"E":"I")+
(score.S>=score.N?"S":"N")+
(score.T>=score.F?"T":"F")+
(score.J>=score.P?"J":"P");

document.getElementById("mbti").innerHTML=mbti;

document.getElementById("desc").innerHTML=descriptions[mbti];

}

showQuestion();

</script>

</body>
</html>
